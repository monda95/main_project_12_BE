  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        로그인 API

        - 사용자 이메일과 비밀번호를 확인하여 유효한 경우, **JWT Access Token과 Refresh Token을 발급**합니다.
        - 이메일 인증이 완료되지 않은 사용자는 로그인이 제한됩니다.
      summary: '[인증] 로그인 (토큰 발급)'
      tags:
      - Auth & Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        로그아웃 API

        - 클라이언트로부터 받은 **Refresh Token을 블랙리스트에 추가**하여 더 이상 사용할 수 없도록 처리합니다.
      summary: '[인증] 로그아웃'
      tags:
      - Auth & Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshToken'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshToken'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshToken'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        토큰 갱신 API

        - 만료된 **Access Token**을 유효한 **Refresh Token**을 사용하여 새로 재발급받습니다.
      summary: '[인증] 토큰 갱신'
      tags:
      - Auth & Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/signup/:
    post:
      operationId: auth_signup_create
      description: |-
        회원가입 API

        - 인증이 불필요하며, 누구나 접근할 수 있습니다.
        - 새로운 사용자를 생성하고 인증 이메일을 발송합니다.
      summary: '[생성] 회원가입'
      tags:
      - Auth & Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Signup'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Signup'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Signup'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signup'
          description: ''
  /api/v1/conversations/:
    get:
      operationId: conversations_list
      description: |-
        대화(Conversation) 리소스에 대한 CRUD API 뷰셋입니다.

        - **list**: 로그인 사용자가 소유한 대화 목록만 조회합니다.
        - **create**: 새로운 대화를 생성합니다. 생성 시 요청 사용자가 자동으로 소유자로 설정됩니다.
        - **retrieve**: 특정 대화의 상세 정보를 조회합니다 (소유자만 가능).
        - **partial_update**: 특정 대화의 정보를 부분적으로 수정합니다 (소유자만 가능).
        - **destroy**: 특정 대화를 삭제합니다 (소유자만 가능).
      summary: 대화 목록 조회
      parameters:
      - name: ordering
        required: false
        in: query
        description: 결과 정렬 시 사용할 필드.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 페이지네이션된 결과 집합 내의 페이지 번호.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: 검색어.
        schema:
          type: string
      tags:
      - Conversations
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversationList'
          description: ''
    post:
      operationId: conversations_create
      description: |-
        대화(Conversation) 리소스에 대한 CRUD API 뷰셋입니다.

        - **list**: 로그인 사용자가 소유한 대화 목록만 조회합니다.
        - **create**: 새로운 대화를 생성합니다. 생성 시 요청 사용자가 자동으로 소유자로 설정됩니다.
        - **retrieve**: 특정 대화의 상세 정보를 조회합니다 (소유자만 가능).
        - **partial_update**: 특정 대화의 정보를 부분적으로 수정합니다 (소유자만 가능).
        - **destroy**: 특정 대화를 삭제합니다 (소유자만 가능).
      summary: 새 대화 생성
      tags:
      - Conversations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConversationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConversationCreate'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationCreate'
          description: ''
  /api/v1/conversations/{conversation_pk}/messages/:
    get:
      operationId: conversations_messages_list
      description: |-
        특정 대화(Conversation)에 속한 메시지를 관리하는 API 뷰
        - GET: 해당 대화의 메시지 목록 (소유자만)
        - POST: 유저 입력 메시지 추가 (role 자동 'user')
      summary: 메시지 목록 조회 및 생성
      parameters:
      - in: path
        name: conversation_pk
        schema:
          type: integer
        required: true
      - name: ordering
        required: false
        in: query
        description: 결과 정렬 시 사용할 필드.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 페이지네이션된 결과 집합 내의 페이지 번호.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: 검색어.
        schema:
          type: string
      tags:
      - Conversations
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMessageList'
          description: ''
    post:
      operationId: conversations_messages_create
      description: |-
        특정 대화(Conversation)에 속한 메시지를 관리하는 API 뷰
        - GET: 해당 대화의 메시지 목록 (소유자만)
        - POST: 유저 입력 메시지 추가 (role 자동 'user')
      summary: 메시지 목록 조회 및 생성
      parameters:
      - in: path
        name: conversation_pk
        schema:
          type: integer
        required: true
      tags:
      - Conversations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Message'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Message'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Message'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
  /api/v1/conversations/{id}/:
    get:
      operationId: conversations_retrieve
      description: |-
        대화(Conversation) 리소스에 대한 CRUD API 뷰셋입니다.

        - **list**: 로그인 사용자가 소유한 대화 목록만 조회합니다.
        - **create**: 새로운 대화를 생성합니다. 생성 시 요청 사용자가 자동으로 소유자로 설정됩니다.
        - **retrieve**: 특정 대화의 상세 정보를 조회합니다 (소유자만 가능).
        - **partial_update**: 특정 대화의 정보를 부분적으로 수정합니다 (소유자만 가능).
        - **destroy**: 특정 대화를 삭제합니다 (소유자만 가능).
      summary: 특정 대화 상세 조회
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Conversations
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
    patch:
      operationId: conversations_partial_update
      description: |-
        대화(Conversation) 리소스에 대한 CRUD API 뷰셋입니다.

        - **list**: 로그인 사용자가 소유한 대화 목록만 조회합니다.
        - **create**: 새로운 대화를 생성합니다. 생성 시 요청 사용자가 자동으로 소유자로 설정됩니다.
        - **retrieve**: 특정 대화의 상세 정보를 조회합니다 (소유자만 가능).
        - **partial_update**: 특정 대화의 정보를 부분적으로 수정합니다 (소유자만 가능).
        - **destroy**: 특정 대화를 삭제합니다 (소유자만 가능).
      summary: 특정 대화 부분 수정
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Conversations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedConversation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedConversation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedConversation'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
    delete:
      operationId: conversations_destroy
      description: |-
        대화(Conversation) 리소스에 대한 CRUD API 뷰셋입니다.

        - **list**: 로그인 사용자가 소유한 대화 목록만 조회합니다.
        - **create**: 새로운 대화를 생성합니다. 생성 시 요청 사용자가 자동으로 소유자로 설정됩니다.
        - **retrieve**: 특정 대화의 상세 정보를 조회합니다 (소유자만 가능).
        - **partial_update**: 특정 대화의 정보를 부분적으로 수정합니다 (소유자만 가능).
        - **destroy**: 특정 대화를 삭제합니다 (소유자만 가능).
