          type: string
        required: true
      tags:
      - Conversations
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/inference/:
    post:
      operationId: inference_create
      description: |-
        Gemini API를 호출하여 AI 추론을 실행하고 관련 데이터를 저장합니다.

        처리 흐름:
        1. 요청 데이터 검증 (conversation_id, prompt, options)
        2. InferenceService.run_inference 실행
           - 대화 조회/생성
           - SearchLog 기록
           - Message 저장
           - Gemini API 호출 및 에러 처리
           - InferenceRun 저장
        3. Gemini 호출 실패 시 → 502 Bad Gateway + 에러 상세 반환
        4. 성공 시 → message_id, role, content, usage 토큰 정보 반환
      summary: Gemini 추론 호출
      tags:
      - AI Inference
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InferenceRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceResponse'
          description: ''
  /api/v1/inference-runs/:
    get:
      operationId: inference_runs_list
      description: |-
        추론 실행 기록(InferenceRun)을 조회하는 API 뷰셋.

        - **list**: 전체 추론 실행 기록 목록
        - **retrieve**: 특정 추론 실행 기록 상세 조회
        - 권한: 관리자 전용
      summary: 추론 실행 기록 목록 조회
      parameters:
      - name: ordering
        required: false
        in: query
        description: 결과 정렬 시 사용할 필드.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 페이지네이션된 결과 집합 내의 페이지 번호.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: 검색어.
        schema:
          type: string
      tags:
      - AI Inference
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInferenceRunList'
          description: ''
  /api/v1/inference-runs/{id}/:
    get:
      operationId: inference_runs_retrieve
      description: |-
        추론 실행 기록(InferenceRun)을 조회하는 API 뷰셋.

        - **list**: 전체 추론 실행 기록 목록
        - **retrieve**: 특정 추론 실행 기록 상세 조회
        - 권한: 관리자 전용
      summary: 특정 추론 실행 기록 조회
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 추론 실행을 식별하는 고유한 정수 값.
        required: true
      tags:
      - AI Inference
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InferenceRun'
          description: ''
  /api/v1/search/autocomplete/:
    get:
      operationId: search_autocomplete_retrieve
      description: |-
        검색어 자동완성 API
        - `?prefix=...` 쿼리 파라미터를 받아, 해당 문자열로 시작하는 기존 검색어를 추천합니다.
        - 사용자 검색 로그(SearchLog)를 직접 조회하여 제안합니다.
      summary: 검색어 자동완성
      tags:
      - Search & Stats
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutocompleteResponse'
          description: ''
  /api/v1/search/recent/:
    get:
      operationId: search_recent_list
      description: |-
        현재 로그인한 사용자의 최근 검색 기록을 반환합니다.
        - 동일 검색어는 중복 제거
        - 최대 20개까지만 반환
      summary: 추천 질문 생성
      parameters:
      - name: ordering
        required: false
        in: query
        description: 결과 정렬 시 사용할 필드.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 페이지네이션된 결과 집합 내의 페이지 번호.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: 검색어.
        schema:
          type: string
      tags:
      - Search & Stats
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRecommendedSearchesResponseList'
          description: ''
  /api/v1/search/recommended/:
    get:
      operationId: search_recommended_retrieve
      description: |-
        최근 검색어 기반 추천 질문 API
        - DB 캐시(RecommendedQuestion 모델)는 사용하지 않고, 최근 검색어 → Gemini API 직통 호출
        - 추천 질문은 Gemini가 생성하며, 최대 4개까지 반환
      summary: 추천 질문 생성
      tags:
      - Search & Stats
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendedSearchesResponse'
          description: ''
  /api/v1/stats/popular-queries/:
    get:
      operationId: stats_popular_queries_list
      description: |-
        인기 검색어 API
        - 사전 집계된 PopularQuery(MV)에서 읽어옴
        - 관리자 대시보드 또는 공개용 통계에 사용
      summary: 인기 검색어 조회
      tags:
      - Search & Stats
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PopularQuery'
          description: ''
  /api/v1/stats/users/:
    get:
      operationId: stats_users_retrieve
      description: |-
        사용자 통계 API (관리자 전용)
        - 총 가입자 수
        - 활성 사용자 수
        - 최근 7일간 일별 신규 가입자 추이
      summary: 사용자 통계 조회
      tags:
      - Search & Stats
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'
          description: ''
  /api/v1/users/me/:
    get:
      operationId: users_me_retrieve
      description: |-
        내 정보 관리 API (/users/me/)

        - **GET**: 내 정보 조회를 처리합니다.
        - **PATCH**: 내 정보 수정을 처리합니다. (부분 수정만으로도 수정허용)
        - **DELETE**: 회원 탈퇴를 처리합니다. (Soft Delete)
      summary: '[조회/수정/탈퇴] 내 정보 관리'
      tags:
      - Auth & Users
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
    patch:
      operationId: users_me_partial_update
      description: |-
        내 정보 관리 API (/users/me/)

        - **GET**: 내 정보 조회를 처리합니다.
        - **PATCH**: 내 정보 수정을 처리합니다. (부분 수정만으로도 수정허용)
        - **DELETE**: 회원 탈퇴를 처리합니다. (Soft Delete)
      summary: '[조회/수정/탈퇴] 내 정보 관리'
      tags:
      - Auth & Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
    delete:
      operationId: users_me_destroy
      description: |-
        내 정보 관리 API (/users/me/)

        - **GET**: 내 정보 조회를 처리합니다.
        - **PATCH**: 내 정보 수정을 처리합니다. (부분 수정만으로도 수정허용)
        - **DELETE**: 회원 탈퇴를 처리합니다. (Soft Delete)
      summary: '[조회/수정/탈퇴] 내 정보 관리'
      tags:
      - Auth & Users
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/users/me/password/:
    put:
      operationId: users_me_password_update
      description: |-
        비밀번호 변경 API

        - `current_password`가 틀릴 경우 400 에러를 반환합니다.
        - `new_password`와 `new_password_confirm`이 일치하지 않을 경우 400 에러를 반환합니다.
        - 성공 시 사용자의 비밀번호를 새로 갱신합니다.
      summary: '[수정] 비밀번호 변경'
      tags:
      - Auth & Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChange'
          description: ''
components:
  schemas:
    AutocompleteResponse:
      type: object
      description: |-
        검색어 자동완성 응답 직렬화
        - 문자열 배열 형태
      properties:
        results:
          type: array
          items:
            type: string
      required:
      - results
    Conversation:
      type: object
      description: 대화 목록 조회 및 상세 조회를 위한 시리얼라이저입니다.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: 대화 제목
          maxLength: 200
        owner:
          type: string
          format: email
          nullable: true
          title: 이메일
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 생성 시각
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 수정 시각
      required:
      - created_at
      - id
      - owner
      - title
      - updated_at
    ConversationCreate:
      type: object
      description: 새 대화를 생성하기 위한 시리얼라이저입니다.
      properties:
        title:
          type: string
          title: 대화 제목
          maxLength: 200
      required:
      - title
    DailySignup:
      type: object
      properties:
        date:
          type: string
          format: date
        count:
          type: integer
      required:
      - count
      - date
    InferenceRequest:
      type: object
      description: Gemini 호출을 위한 요청 시리얼라이저입니다.
      properties:
        conversation_id:
          type: integer
          description: 대화 ID
        prompt:
          type: string
          description: 사용자 프롬프트 내용
        options:
          description: Gemini API 호출 옵션 (temperature, max_output_tokens 등)
      required:
      - conversation_id
      - prompt
    InferenceResponse:
      type: object
      description: Gemini 호출 후 응답을 위한 시리얼라이저입니다.
      properties:
        message_id:
          type: integer
          description: 생성된 메시지 ID
        role:
          type: string
          description: 메시지 역할 (assistant)
        content:
          description: AI 응답 내용 (구조화된 JSON)
        usage:
          allOf:
          - $ref: '#/components/schemas/Usage'
          description: API 사용량 정보
      required:
      - content
      - message_id
      - role
      - usage
    InferenceRun:
      type: object
      description: 추론 실행 기록 조회를 위한 시리얼라이저입니다.
      properties:
        id:
          type: integer
          readOnly: true
        owner_email:
          type: string
          readOnly: true
        conversation:
          type: string
          title: 대화 제목
          readOnly: true
        model:
          type: string
          title: 사용 모델
          maxLength: 100
        latency_ms:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: 지연 시간(ms)
        prompt_tokens:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          title: 프롬프트 토큰 수
        completion_tokens:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          title: 응답 토큰 수
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          title: 상태
        error_code:
          type: string
          nullable: true
          title: 오류 코드
          maxLength: 50
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 생성 시각
      required:
      - conversation
      - created_at
      - id
      - latency_ms
      - model
      - owner_email
    Message:
      type: object
      description: |-
        메시지 목록 조회 및 생성을 위한 시리얼라이저
        - 클라이언트는 content만 입력
        - role은 자동으로 'user'로 강제됨
      properties:
        id:
          type: integer
          readOnly: true
        conversation:
          type: integer
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
          title: 역할
        content:
          type: string
          title: 내용
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 생성 시각
      required:
      - content
      - conversation
      - created_at
      - id
      - role
    PaginatedConversationList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
    PaginatedInferenceRunList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/InferenceRun'
    PaginatedMessageList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    PaginatedRecommendedSearchesResponseList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/RecommendedSearchesResponse'
    PasswordChange:
      type: object
      description: 비밀번호 변경을 위한 시리얼라이저입니다.
      properties:
        current_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - current_password
      - new_password
      - new_password_confirm
    PatchedConversation:
      type: object
      description: 대화 목록 조회 및 상세 조회를 위한 시리얼라이저입니다.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: 대화 제목
          maxLength: 200
        owner:
          type: string
          format: email
          nullable: true
          title: 이메일
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 생성 시각
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 수정 시각
    PatchedUserUpdate:
      type: object
      description: 사용자 정보(이름, 닉네임) 수정을 위한 시리얼라이저입니다.
      properties:
        username:
          type: string
          title: 사용자명
          maxLength: 100
        nickname:
          type: string
          nullable: true
          title: 닉네임
          maxLength: 50
        image_url:
          type: string
          format: uri
          nullable: true
          title: 프로필 이미지
          maxLength: 500
    PopularQuery:
      type: object
      properties:
        query:
          type: string
        count:
          type: integer
      required:
      - count
      - query
    RecommendedSearchesResponse:
      type: object
      description: |-
        추천 질문 응답 직렬화
        - AI가 생성한 문자열 배열 형태
      properties:
        results:
          type: array
          items:
            type: string
      required:
      - results
    RefreshToken:
      type: object
      description: 로그아웃 시 refresh 토큰을 받기 위한 시리얼라이저입니다.
      properties:
        refresh:
          type: string
      required:
      - refresh
    RoleEnum:
      enum:
      - user
      - ai
      type: string
      description: |-
        * `user` - 사용자
        * `ai` - AI
    Signup:
      type: object
      properties:
        email:
          type: string
          format: email
          nullable: true
          title: 이메일
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 8
        username:
          type: string
          title: 사용자명
          maxLength: 100
        nickname:
          type: string
          nullable: true
          title: 닉네임
          maxLength: 50
      required:
      - password
      - username
    StatusEnum:
      enum:
      - success
      - error
      type: string
      description: |-
        * `success` - 성공
        * `error` - 오류
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    Usage:
      type: object
      description: API 사용량(토큰) 정보를 위한 중첩 시리얼라이저입니다.
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
      required:
      - completion_tokens
      - prompt_tokens
    UserDetail:
      type: object
      description: 사용자 상세 정보 조회를 위한 시리얼라이저입니다.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          nullable: true
          title: 이메일
        username:
          type: string
          readOnly: true
          title: 사용자명
        nickname:
          type: string
          readOnly: true
          nullable: true
          title: 닉네임
        image_url:
          type: string
          format: uri
          readOnly: true
          nullable: true
          title: 프로필 이미지
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 생성 시각
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 수정 시각
      required:
      - created_at
      - email
      - id
      - image_url
      - nickname
      - updated_at
      - username
    UserStats:
      type: object
      properties:
        total_users:
          type: integer
        active_users:
          type: integer
        daily_signups_last_7_days:
          type: array
          items:
            $ref: '#/components/schemas/DailySignup'
      required:
      - active_users
      - daily_signups_last_7_days
      - total_users
    UserUpdate:
      type: object
      description: 사용자 정보(이름, 닉네임) 수정을 위한 시리얼라이저입니다.
      properties:
        username:
          type: string
          title: 사용자명
          maxLength: 100
        nickname:
          type: string
          nullable: true
          title: 닉네임
          maxLength: 50
        image_url:
          type: string
          format: uri
          nullable: true
          title: 프로필 이미지
          maxLength: 500
      required:
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: Auth & Users
  description: 회원가입, 로그인/로그아웃, 내 정보 조회/수정, 탈퇴 등 사용자 계정 관련 API
- name: Conversations
  description: 대화 생성, 메시지 기록, 대화 관리 API
- name: AI Inference
  description: Gemini AI 기반 추론 API 및 실행 로그 관리, 운영자 용 모니터링
- name: Search & Stats
  description: 검색 로그, 인기 검색어, 추천 질문 및 통계 API
