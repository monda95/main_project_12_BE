upstream nourisher_app {
    server web:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name 13.125.180.143;
    charset utf-8;

    # 기본 보안 헤더 (HTTPS 아닐 때는 최소화)
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Cross-Origin-Resource-Policy "cross-origin";
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    add_header Strict-Transport-Security "max-age=0" always;

    # 정적 파일
    location /static/ {
        root /var/www/nourisher;
        try_files $uri $uri/ =404;
        expires 5m;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /media/ {
        root /var/www/nourisher;
        try_files $uri $uri/ =404;
        expires 5m;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /healthz {
        access_log off;
        return 200 'ok';
    }

    location / {
        proxy_pass http://nourisher_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # HTTPS 업그레이드를 강제하는 상위 프록시가 존재하더라도
        # 여기에서 HTTP로 덮어써서 Gunicorn/Django가 안전하게 HTTP로 인지하도록 한다.
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Scheme http;
        proxy_set_header X-Forwarded-Ssl off;
        proxy_set_header Front-End-Https off;
        proxy_set_header X-Forwarded-Port 80;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    client_max_body_size 25m;
}

access_log /var/log/nginx/access.log;
error_log  /var/log/nginx/error.log warn;

