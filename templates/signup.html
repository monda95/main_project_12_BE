{% extends "base.html" %}

{% block title %}회원가입 - Nourisher{% endblock %}

{% block content %}
<div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-lg">
    <h2 class="text-3xl font-bold text-center text-gray-900">회원가입</h2>
    <form method="post" action="{% url 'signup-page' %}" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">이메일</label>
            <input type="email" name="email" id="email" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">비밀번호</label>
            <input type="password" name="password" id="password" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        </div>
        <div>
            <label for="password_confirm" class="block text-sm font-medium text-gray-700">비밀번호 확인</label>
            <input type="password" name="password_confirm" id="password_confirm" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        </div>
        <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            회원가입
        </button>
    </form>
    <div class="text-center text-sm text-gray-600">
        이미 계정이 있으신가요? <a href="{% url 'login-page' %}" class="font-medium text-indigo-600 hover:text-indigo-500">로그인</a>
    </div>
</div>
{% endblock %}
