{% extends "base.html" %}

{% block title %}대시보드 - Nourisher{% endblock %}

{% block content %}
<div class="dashboard">
    <h2 class="dashboard__title">환영합니다, 사용자님!</h2>
    <p class="dashboard__subtitle">Nourisher 대시보드에서 다양한 정보를 확인하세요.</p>

    <div class="dashboard-grid">
        <article class="dashboard-card">
            <h3 class="dashboard-card__title">최근 활동</h3>
            <ul class="dashboard-card__list">
                <li><a href="#" class="dashboard-link">닭가슴살 영양 정보 검색</a></li>
                <li><a href="#" class="dashboard-link">새로운 대화 시작</a></li>
                <li><a href="#" class="dashboard-link">프로필 업데이트</a></li>
            </ul>
        </article>

        <article class="dashboard-card">
            <h3 class="dashboard-card__title">통계 요약</h3>
            <p class="dashboard-card__text">총 검색 횟수: <span class="dashboard-card__highlight">123</span></p>
            <p class="dashboard-card__text">총 대화 수: <span class="dashboard-card__highlight">15</span></p>
        </article>

        <article class="dashboard-card">
            <h3 class="dashboard-card__title">추천 콘텐츠</h3>
            <p class="dashboard-card__text">"건강한 식단" 관련 최신 정보</p>
            <button class="dashboard-button" type="button">더 보기</button>
        </article>
    </div>
</div>
{% endblock %}
