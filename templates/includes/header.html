{% load static %}
<header class="site-header header-banner" data-header>
  <div class="header-banner-inner">
    <div class="header-banner-left">
      <div class="header-logo-row">
        <a href="{% url 'main-page' %}"
           class="site-logo"
           data-theme-title>
          Nourisher
        </a>
      </div>
      <p class="header-banner-tagline">AI 음식 영양 분석 도우미</p>
    </div>
    <div class="header-banner-right">
      <div class="theme-menu" data-theme-menu>
        <button type="button"
                class="theme-control-btn"
                data-theme-trigger
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="theme-menu-panel">
          <span class="theme-trigger-caption" data-theme-trigger-label>사용자 설정</span>
          <span class="theme-trigger-label" data-theme-label>
            <span class="theme-indicator-dot" data-theme-indicator></span>
            <span data-theme-current-text>기본 모드</span>
          </span>
        </button>
        <div class="theme-dropdown" id="theme-menu-panel" role="presentation">
          <form class="theme-dropdown__form"
                aria-label="테마 선택"
                data-theme-form>
            <div class="theme-dropdown__intro">
              <p>사용자설정</p>
              <p>원하는 UI 모드를 선택하세요.</p>
            </div>
            <div class="theme-option-list">
              <label for="theme-system"
                     data-theme-option="system"
                     role="option"
                     aria-selected="false">
                <input type="radio"
                       name="theme"
                       value="system"
                       id="theme-system"
                       class="sr-only" />
                <div class="theme-option">
                  <span class="theme-option__label">사용자설정</span>
                  <span class="theme-option__badge" data-default-label="SYSTEM" data-active-label="ACTIVE">SYSTEM</span>
                </div>
              </label>
              <label for="theme-light"
                     data-theme-option="light"
                     role="option"
                     aria-selected="true">
                <input type="radio"
                       name="theme"
                       value="light"
                       id="theme-light"
                       class="sr-only"
                       checked />
                <div class="theme-option">
                  <span class="theme-option__label">기본</span>
                  <span class="theme-option__badge" data-default-label="LIGHT" data-active-label="ACTIVE">LIGHT</span>
                </div>
              </label>
              <label for="theme-dark"
                     data-theme-option="dark"
                     role="option"
                     aria-selected="false">
                <input type="radio"
                       name="theme"
                       value="dark"
                       id="theme-dark"
                       class="sr-only" />
                <div class="theme-option">
                  <span class="theme-option__label">다크</span>
                  <span class="theme-option__badge" data-default-label="DARK" data-active-label="ACTIVE">DARK</span>
                </div>
              </label>
            </div>
          </form>
        </div>
      </div>
      <nav class="header-auth-actions">
        {% if user.is_authenticated %}
          <form method="post"
                action="{% url 'logout' %}"
                class="contents"
                data-logout-form>
            {% csrf_token %}
            <button type="submit" class="header-auth-btn header-auth-btn--logout">
              로그아웃
            </button>
          </form>
        {% else %}
          <a href="{% url 'login-page' %}" class="header-auth-btn header-auth-btn--login">
            로그인
          </a>
          <a href="{% url 'signup-page' %}" class="header-auth-btn header-auth-btn--signup">
            회원가입
          </a>
        {% endif %}
      </nav>
    </div>
  </div>
</header>
