{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Fluent AI Assistant{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="w-full shadow-md bg-white/80 backdrop-blur-sm fixed top-0 z-10">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4">
      <h1 class="text-2xl font-bold text-indigo-600">FluentAI</h1>
      <nav class="flex gap-4">
        {% if user.is_authenticated %}
          <button class="px-4 py-2 rounded-xl bg-indigo-500 text-white shadow hover:bg-indigo-600 transition">
            로그아웃
          </button>
        {% else %}
          <button class="px-4 py-2 rounded-xl bg-white border border-gray-300 shadow hover:shadow-md transition">
            로그인
          </button>
          <button class="px-4 py-2 rounded-xl bg-indigo-500 text-white shadow hover:bg-indigo-600 transition">
            회원가입
          </button>
          <button class="px-4 py-2 rounded-xl bg-gray-800 text-white shadow hover:bg-gray-900 transition">
            GitHub OAuth
          </button>
        {% endif %}
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex flex-col justify-center items-center pt-24">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white shadow-inner mt-12">
    <div class="max-w-6xl mx-auto text-center py-4 text-gray-500 text-sm">
      &copy; 2025 Fluent AI Assistant — Powered by Django & Gemini
    </div>
  </footer>

  <!-- JS -->
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
