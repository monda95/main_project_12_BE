{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Nourisher{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/chat.css' %}">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="w-full shadow-md bg-white/80 backdrop-blur-sm fixed top-0 z-10">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4">
      <h1 class="text-2xl font-bold text-indigo-600">Nourisher</h1>
      <nav class="flex gap-4">
        {% if user.is_authenticated %}
          <form method="post" action="{% url 'logout' %}" class="contents">
            {% csrf_token %}
            <button type="submit" class="px-4 py-2 rounded-xl bg-indigo-500 text-white shadow hover:bg-indigo-600 transition">
              로그아웃
            </button>
          </form>
        {% else %}
          <a href="{% url 'login-page' %}" class="px-4 py-2 rounded-xl bg-white border border-gray-300 shadow hover:shadow-md transition">
            로그인
          </a>
          <a href="{% url 'signup-page' %}" class="px-4 py-2 rounded-xl bg-indigo-500 text-white shadow hover:bg-indigo-600 transition">
            회원가입
          </a>
          <a href="{% url 'start_github_oauth' %}" class="px-4 py-2 rounded-xl bg-gray-800 text-white shadow hover:bg-gray-900 transition">
            GitHub OAuth
          </a>
        {% endif %}
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex flex-col justify-center items-center pt-24">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
{#  <footer class="bg-white shadow-inner mt-12">#}
{#    <div class="max-w-6xl mx-auto text-center py-4 text-gray-500 text-sm">#}
{#      &copy; 2025 Nourisher — Powered by Django & Gemini#}
{#    </div>#}
{#  </footer>#}

  <!-- JS -->
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
